# Configuração do Banco de Dados
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:${POSTGRES_DB:gourmethub}}
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:gourmethub}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:gourmethub}}

spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Porta da API
server.port=${SERVER_PORT:8080}

# JWT
app.jwt.secret=${APP_JWT_SECRET:changeme-changeme-changeme-changeme}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

services:
  postgres:
    image: postgres:13
    container_name: receitasapi_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-receitasapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-receitasapi}
      POSTGRES_DB: ${POSTGRES_DB:-receitasapi}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: receitasapi_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-receitasapi}
      DB_USERNAME: ${POSTGRES_USER:-receitasapi}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-receitasapi}
      SERVER_PORT: 8080
      APP_JWT_SECRET: ${APP_JWT_SECRET:-changeme-changeme-changeme-changeme}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./receitasapi-ui
      dockerfile: Dockerfile
    container_name: receitasapi_frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  sonar-db:
    image: postgres:13
    container_name: receitasapi_sonar_db
    profiles:
      - sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sonarqube:
    image: sonarqube:lts-community
    container_name: receitasapi_sonarqube
    profiles:
      - sonar
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    restart: unless-stopped

  sonar:
    build:
      context: .
      dockerfile: sonar/Dockerfile
    container_name: receitasapi_sonar_runner
    profiles:
      - sonar
    depends_on:
      sonar-db:
        condition: service_started
      sonarqube:
        condition: service_started
    restart: "no"

volumes:
  postgres_data:
  sonar_db_data:

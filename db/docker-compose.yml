version: '3.8'
services:
  postgres:
    image: postgres:13
    container_name: receitasapi_db
    environment:
      POSTGRES_USER: receitasapi
      POSTGRES_PASSWORD: receitasapi
      POSTGRES_DB: receitasapi
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receitasapi -d receitasapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: receitasapi_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: receitasapi
      DB_USERNAME: receitasapi
      DB_PASSWORD: receitasapi
      SERVER_PORT: 8080
      APP_JWT_SECRET: changeme-changeme-changeme-changeme
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../receitasapi-ui
      dockerfile: Dockerfile
    container_name: receitasapi_frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:

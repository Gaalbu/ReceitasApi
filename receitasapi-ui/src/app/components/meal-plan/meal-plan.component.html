<div class="container" style="max-width: 960px; margin: 1.5rem auto;">
  <h3 class="mb-3">Plano Semanal de Refeicoes</h3>
  <p class="text-muted mb-4">
    Preencha os recipeId por dia e refeicao. Campos vazios nao sao enviados.
  </p>

  <form (ngSubmit)="submit()" [formGroup]="form">
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <label class="form-label">Nome do plano</label>
        <input class="form-control" formControlName="plan_name" placeholder="Ex: Semana Fit" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Data inicial</label>
        <input type="date" class="form-control" formControlName="start_date" />
      </div>
    </div>

    <div class="table-responsive mb-4">
      <table class="table table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th style="width: 20%;">Dia</th>
            <th style="width: 40%;">Almoco (recipeId)</th>
            <th style="width: 40%;">Jantar (recipeId)</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let day of weekdays">
            <td class="fw-semibold">{{ day.label }}</td>
            <td>
              <input
                type="number"
                min="1"
                class="form-control"
                [formControlName]="controlName(day.value, 'LUNCH')"
                placeholder="Ex: 1"
              />
            </td>
            <td>
              <input
                type="number"
                min="1"
                class="form-control"
                [formControlName]="controlName(day.value, 'DINNER')"
                placeholder="Ex: 2"
              />
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="d-flex flex-wrap gap-2">
      <button class="btn btn-primary" type="submit">Salvar plano</button>
      <button class="btn btn-outline-secondary" type="button" (click)="saveDraft()">Salvar rascunho</button>
      <button class="btn btn-outline-dark" type="button" (click)="loadDraft()">Carregar rascunho</button>
    </div>

    <div *ngIf="message" class="mt-3 alert alert-info">{{ message }}</div>
  </form>
</div>

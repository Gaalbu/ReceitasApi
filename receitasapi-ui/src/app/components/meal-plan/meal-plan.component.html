<div class="container py-4" style="max-width: 1200px;">
  <section class="mb-4 p-4 rounded-4 text-white" style="background: linear-gradient(135deg, #111827, #7c3aed 60%, #0f766e);">
    <p class="text-uppercase small fw-bold mb-2" style="letter-spacing: .18em;">CRUD</p>
    <h3 class="fw-bold mb-2">Plano Semanal de Refeições</h3>
    <p class="mb-0 text-white-50">
      Use apenas receitas válidas da API ou criadas para montar a semana. Os campos de ID foram trocados por seleção.
    </p>
  </section>

  <div *ngIf="message" class="alert alert-info">{{ message }}</div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-8">
          <label class="form-label" for="meal-search">Buscar receitas na API</label>
          <input id="meal-search" class="form-control" [(ngModel)]="recipeSearch" placeholder="Ex: frango, massa, salada">
        </div>
        <div class="col-12 col-md-4 d-grid">
          <button class="btn btn-outline-primary" type="button" (click)="searchRecipes()" [disabled]="loadingRecipes">
            {{ loadingRecipes ? 'Carregando...' : 'Atualizar opções' }}
          </button>
        </div>
      </div>
      <p class="text-muted mb-0 mt-3">Opções disponíveis: {{ availableRecipes.length }} receitas.</p>
    </div>
  </div>

  <form (ngSubmit)="submit()" [formGroup]="form" class="card border-0 shadow-sm">
    <div class="card-body">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Nome do plano</label>
          <input class="form-control" formControlName="plan_name" placeholder="Ex: Semana Fit" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Data inicial</label>
          <input type="date" class="form-control" formControlName="start_date" />
        </div>
      </div>

      <div class="table-responsive mb-4">
        <table class="table table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th style="width: 20%;">Dia</th>
              <th style="width: 40%;">Almoço</th>
              <th style="width: 40%;">Jantar</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let day of weekdays">
              <td class="fw-semibold">{{ day.label }}</td>
              <td>
                <select class="form-select" [formControlName]="controlName(day.value, 'LUNCH')">
                  <option value="">Selecione uma receita</option>
                  <option *ngFor="let recipe of availableRecipes" [value]="recipe.id">{{ recipe.label }} - {{ recipe.source === 'mine' ? 'minha' : 'API' }}</option>
                </select>
              </td>
              <td>
                <select class="form-select" [formControlName]="controlName(day.value, 'DINNER')">
                  <option value="">Selecione uma receita</option>
                  <option *ngFor="let recipe of availableRecipes" [value]="recipe.id">{{ recipe.label }} - {{ recipe.source === 'mine' ? 'minha' : 'API' }}</option>
                </select>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-primary" type="submit">Salvar plano</button>
        <button class="btn btn-outline-secondary" type="button" (click)="saveDraft()">Salvar rascunho</button>
        <button class="btn btn-outline-dark" type="button" (click)="loadDraft()">Carregar rascunho</button>
      </div>
    </div>
  </form>
</div>

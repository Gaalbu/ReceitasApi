<div class="container" style="max-width:640px;margin:2rem auto;">
  <h2 class="mb-3">Meu perfil</h2>
  <p class="text-muted">Atualize seus dados ou exclua a conta. Os campos são opcionais; preencha apenas o que quiser alterar.</p>

  <form [formGroup]="form" (ngSubmit)="save()" class="mb-4">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input class="form-control" formControlName="username" placeholder="Novo usuário" [disabled]="loading" />
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input class="form-control" formControlName="email" type="email" placeholder="novo@email.com" [disabled]="loading" />
    </div>

    <div class="mb-3">
      <label class="form-label">Nova senha</label>
      <input class="form-control" formControlName="password" type="password" placeholder="Nova senha" [disabled]="loading" />
    </div>

    <div class="d-flex flex-wrap gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Salvar alterações</button>
      <button class="btn btn-outline-danger" type="button" (click)="removeAccount()" [disabled]="loading">Excluir conta</button>
    </div>
  </form>

  <div *ngIf="message" class="alert alert-info">{{ message }}</div>
</div>

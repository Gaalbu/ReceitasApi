<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Favoritos</h2>
    <button class="btn btn-primary" (click)="showCreate = !showCreate">+ Adicionar favorito</button>
  </div>

  <p class="text-muted">Receitas marcadas como favoritas.</p>

  <div *ngIf="showCreate" class="card mb-3 p-3">
    <div class="mb-2">
      <label class="form-label" for="favorite-recipe-id">ID da receita</label>
      <input id="favorite-recipe-id" class="form-control" type="number" [(ngModel)]="newRecipeId">
    </div>
    <div class="mb-2">
      <label class="form-label" for="favorite-title">Título</label>
      <input id="favorite-title" class="form-control" [(ngModel)]="newRecipeTitle">
    </div>
    <div>
      <button class="btn btn-success" (click)="create()">Salvar</button>
      <button class="btn btn-secondary ms-2" (click)="showCreate=false">Cancelar</button>
    </div>
  </div>

  <ul class="list-group">
    <li *ngIf="error" class="list-group-item text-danger">{{ error }}</li>
    <li *ngFor="let f of favorites" class="list-group-item d-flex justify-content-between align-items-center">
      <div>
        <strong>{{ f.recipeTitle || ('Receita ' + f.id) }}</strong>
        <div class="text-muted small">ID: {{ f.id }}</div>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2" (click)="startEdit(f)">Editar</button>
        <button class="btn btn-sm btn-outline-danger" (click)="remove(f.id)">Remover</button>
      </div>
    </li>
    <li *ngIf="editing" class="list-group-item">
        <div class="mb-2"><label class="form-label" for="favorite-edit-title">Título</label>
          <input id="favorite-edit-title" class="form-control" [(ngModel)]="editing.recipeTitle"></div>
      <div>
        <button class="btn btn-success" (click)="saveEdit()">Salvar</button>
        <button class="btn btn-secondary ms-2" (click)="cancelEdit()">Cancelar</button>
      </div>
    </li>
    <li *ngIf="!favorites?.length && !error" class="list-group-item text-muted">Nenhum favorito encontrado.</li>
  </ul>
</div>

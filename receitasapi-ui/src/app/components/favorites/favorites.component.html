<div class="container py-4">
  <section class="mb-4 p-4 rounded-4 text-white" style="background: linear-gradient(135deg, #111827, #0f766e);">
    <p class="text-uppercase small fw-bold mb-2" style="letter-spacing: .18em;">CRUD</p>
    <div class="d-flex justify-content-between align-items-end gap-3 flex-wrap">
      <div>
        <h2 class="fw-bold mb-2">Favoritos</h2>
        <p class="mb-0 text-white-50">Receitas marcadas como favoritas, com seleção limitada às receitas válidas da API ou criadas.</p>
      </div>
      <button class="btn btn-light btn-lg" (click)="showCreate = !showCreate">+ Adicionar favorito</button>
    </div>
  </section>

  <div *ngIf="showCreate" class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-5">
          <label class="form-label" for="favorite-search">Buscar receitas na API</label>
          <input id="favorite-search" class="form-control" [(ngModel)]="recipeSearch" placeholder="Ex: bolo, frango, salada">
        </div>
        <div class="col-12 col-md-2">
          <button class="btn btn-outline-primary w-100" type="button" (click)="searchRecipes()" [disabled]="loadingRecipes">
            {{ loadingRecipes ? 'Carregando...' : 'Buscar' }}
          </button>
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label" for="favorite-recipe-id">Receita válida</label>
          <select id="favorite-recipe-id" class="form-select" [(ngModel)]="newRecipeId" (change)="syncSelectedRecipe()">
            <option [ngValue]="null">Selecione uma receita</option>
            <option *ngFor="let recipe of availableRecipes" [ngValue]="recipe.id">
              {{ recipe.label }} - {{ recipe.source === 'mine' ? 'minha' : 'API' }}
            </option>
          </select>
        </div>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-12 col-md-9">
          <label class="form-label" for="favorite-title">Título</label>
          <input id="favorite-title" class="form-control" [(ngModel)]="newRecipeTitle" placeholder="Título do favorito">
        </div>
        <div class="col-12 col-md-3 d-grid">
          <button class="btn btn-success" type="button" (click)="create()">Salvar</button>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-outline-secondary" type="button" (click)="showCreate=false">Cancelar</button>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Lista de favoritos</h5>
        <span class="badge text-bg-dark">{{ favorites.length }} itens</span>
      </div>

      <div *ngIf="favorites.length === 0 && !error" class="text-muted py-4 text-center">
        Nenhum favorito encontrado.
      </div>

      <div class="table-responsive" *ngIf="favorites.length > 0">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th class="text-end">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let f of favorites">
              <td>{{ f.id }}</td>
              <td>
                <div class="fw-semibold">{{ f.recipeTitle || ('Receita ' + f.id) }}</div>
              </td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-secondary me-2" (click)="startEdit(f)">Editar</button>
                <button class="btn btn-sm btn-outline-danger" (click)="remove(f.id)">Remover</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div *ngIf="editing" class="mt-4 p-3 rounded-3 bg-light">
        <h6 class="mb-3">Editar favorito</h6>
        <div class="mb-2">
          <label class="form-label" for="favorite-edit-title">Título</label>
          <input id="favorite-edit-title" class="form-control" [(ngModel)]="editing.recipeTitle">
        </div>
        <div>
          <button class="btn btn-success" (click)="saveEdit()">Salvar</button>
          <button class="btn btn-secondary ms-2" (click)="cancelEdit()">Cancelar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Favoritos</h2>
    <a class="btn btn-primary" routerLink="/favorites/create">+ Adicionar favorito</a>
  </div>

  <p class="text-muted">Receitas marcadas como favoritas.</p>

  <ul class="list-group">
    <li *ngIf="error" class="list-group-item text-danger">{{ error }}</li>
    <li *ngFor="let f of favorites" class="list-group-item d-flex justify-content-between align-items-center">
      <div>
        <strong>{{ f.recipeTitle || ('Receita ' + f.id) }}</strong>
        <div class="text-muted small">ID: {{ f.id }}</div>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-danger" (click)="remove(f.id)">Remover</button>
      </div>
    </li>
    <li *ngIf="!favorites?.length && !error" class="list-group-item text-muted">Nenhum favorito encontrado.</li>
  </ul>
</div>

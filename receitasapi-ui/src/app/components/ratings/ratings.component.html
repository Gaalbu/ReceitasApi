<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Avaliações</h2>
    <a class="btn btn-primary" routerLink="/ratings/create">+ Nova avaliação</a>
  </div>

  <p class="text-muted">Lista de avaliações de receitas.</p>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div class="list-group">
    <div *ngFor="let r of ratings" class="list-group-item d-flex justify-content-between align-items-center">
      <div>
        <strong>{{ r.recipeTitle || ('Receita ' + r.recipeId) }}</strong>
        <div class="text-muted small">Avaliação: {{ r.score || r.rating || '—' }}</div>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2" (click)="startEdit(r)">Editar</button>
        <a class="btn btn-sm btn-outline-secondary" [routerLink]="['/recipes', r.recipeId]">Abrir</a>
      </div>
    </div>
    <div *ngIf="!ratings?.length && !error" class="list-group-item text-muted">Você não fez avaliações ainda.</div>
  </div>
  <div *ngIf="editing" class="card p-3 mt-3">
    <label class="form-label" for="rating-edit-score">Nota</label>
    <input id="rating-edit-score" class="form-control mb-2" type="number" [(ngModel)]="editing.rating">
    <div>
      <button class="btn btn-success" (click)="saveEdit()">Salvar</button>
      <button class="btn btn-secondary ms-2" (click)="cancelEdit()">Cancelar</button>
    </div>
  </div>

  <div class="card p-3 mt-3">
    <h5>Adicionar avaliação</h5>
    <div class="mb-2"><label class="form-label" for="rating-recipe-id">ID da receita</label><input id="rating-recipe-id" class="form-control" type="number" [(ngModel)]="newRecipeId"></div>
    <div class="mb-2"><label class="form-label" for="rating-score">Nota</label><input id="rating-score" class="form-control" type="number" [(ngModel)]="newScore"></div>
    <button class="btn btn-primary" (click)="add()">Adicionar</button>
  </div>
</div>

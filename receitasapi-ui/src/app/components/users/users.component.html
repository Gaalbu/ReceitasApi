<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Usuários</h2>
    <a class="btn btn-primary" routerLink="/users/create">+ Novo usuário</a>
  </div>

  <p class="text-muted">Lista de usuários (placeholder). Integração backend pode ser adicionada posteriormente.</p>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Id</th>
        <th>Nome</th>
        <th>Email</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of users">
        <td>{{ u.id }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td>
          <a class="btn btn-sm btn-outline-secondary me-2">Editar</a>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteAccount()">Remover minha conta</button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
</div>

<div class="container mt-3">
  <div class="card p-3 mb-3">
    <h5>Criar usuário (demo)</h5>
    <div class="mb-2"><label class="form-label">Nome</label><input class="form-control" [(ngModel)]="formName"></div>
    <div class="mb-2"><label class="form-label">Email</label><input class="form-control" [(ngModel)]="formEmail"></div>
    <div>
      <button class="btn btn-primary" (click)="create()">Criar</button>
    </div>
  </div>

  <div *ngIf="editingId" class="card p-3">
    <h5>Editar usuário</h5>
    <div class="mb-2"><label class="form-label">Nome</label><input class="form-control" [(ngModel)]="formName"></div>
    <div class="mb-2"><label class="form-label">Email</label><input class="form-control" [(ngModel)]="formEmail"></div>
    <div>
      <button class="btn btn-success" (click)="saveEdit()">Salvar</button>
      <button class="btn btn-secondary ms-2" (click)="cancelEdit()">Cancelar</button>
    </div>
  </div>
</div>

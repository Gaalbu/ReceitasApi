<div class="container" style="max-width:900px;margin:1.5rem auto;">
  <h3>Buscar receitas (TheMealDB)</h3>
  <form (ngSubmit)="search()" [formGroup]="searchForm" class="d-flex gap-2 mb-3">
    <input class="form-control" formControlName="q" placeholder="Nome da receita" />
    <button class="btn btn-outline-primary" type="submit">Buscar</button>
  </form>

  <div class="row">
    <div *ngFor="let meal of results" class="col-md-4 mb-3">
      <div class="card">
        <img [src]="meal.strMealThumb || meal.thumbnail" class="card-img-top" />
        <div class="card-body">
          <h5 class="card-title">{{ meal.strMeal || meal.name }}</h5>
          <p class="card-text">{{ (meal.strInstructions || meal.instructions)?.slice(0,120) }}...
        </div>
      </div>
    </div>
  </div>

  <hr />
  <h4>Criar minha receita</h4>
  <form (ngSubmit)="create()" [formGroup]="createForm">
    <div class="mb-2">
      <input class="form-control" formControlName="name" placeholder="Nome" />
    </div>
    <div class="mb-2">
      <input class="form-control" formControlName="description" placeholder="Descricao" />
    </div>
    <div class="mb-2">
      <textarea class="form-control" formControlName="instructions" placeholder="Instrucoes"></textarea>
    </div>
    <button class="btn btn-success" type="submit">Criar</button>
    <div *ngIf="message" class="mt-2 alert alert-info">{{ message }}</div>
  </form>
</div>

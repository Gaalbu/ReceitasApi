<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" routerLink="/">🍽️ GourmetHub</a>
    
    <button class="navbar-toggler" type="button" (click)="toggleNavbar()">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" [class.show]="navbarOpen">
      <ul class="navbar-nav ms-auto">
        <!-- Links quando LOGADO -->
        <ng-container *ngIf="isLoggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" (click)="closeNavbar()" [routerLinkActiveOptions]="{ exact: true }">
              🔍 Buscar Receitas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/create-recipe" routerLinkActive="active" (click)="closeNavbar()">
              ➕ Criar Receita
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/meal-plans" routerLinkActive="active" (click)="closeNavbar()">
              📋 Planos de Refeição
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/feedback" routerLinkActive="active" (click)="closeNavbar()">
              💬 Feedback
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="logout(); $event.preventDefault()" class="text-danger">
              🚪 Logout
            </a>
          </li>
        </ng-container>

        <!-- Links quando NÃO LOGADO -->
        <ng-container *ngIf="!isLoggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active" (click)="closeNavbar()">
              🔑 Login
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/register" routerLinkActive="active" (click)="closeNavbar()">
              ✍️ Cadastro
            </a>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>

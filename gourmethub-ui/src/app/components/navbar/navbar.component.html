<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" routerLink="/">🍽️ ReceitasApi</a>
    
    <button class="navbar-toggler" type="button" (click)="toggleNavbar()">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="navbar-collapse" [class.show]="navbarOpen">
      <ul class="navbar-nav ms-auto">
        <!-- Links quando LOGADO -->
        <ng-container *ngIf="isLoggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" (click)="closeNavbar()" [routerLinkActiveOptions]="{ exact: true }">
              🔍 Buscar Receitas
            </a>
          </li>
          <!-- Top-right dropdown menu -->
          <li class="nav-item dropdown" [class.show]="dropdownOpen" style="position:relative">
            <a class="nav-link dropdown-toggle" href="#" role="button"
               (click)="toggleDropdown(); $event.preventDefault()"
               [attr.aria-expanded]="dropdownOpen">
              ☰ Menu
            </a>
            <ul class="dropdown-menu dropdown-menu-end" [class.show]="dropdownOpen" style="right:0; left:auto;">
              <li><a class="dropdown-item" routerLink="/meal-plans" (click)="closeDropdown(); closeNavbar()">Criar receita semanal</a></li>
              <li><a class="dropdown-item" routerLink="/create-recipe" (click)="closeDropdown(); closeNavbar()">Criar uma receita</a></li>
              <li><a class="dropdown-item" routerLink="/feedback" (click)="closeDropdown(); closeNavbar()">Acessar os meus reviews</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" (click)="logout(); closeDropdown(); $event.preventDefault()">Sair do sistema</a></li>
            </ul>
          </li>
        </ng-container>

        <!-- Links quando NÃO LOGADO -->
        <ng-container *ngIf="!isLoggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active" (click)="closeNavbar()">
              🔑 Login
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/register" routerLinkActive="active" (click)="closeNavbar()">
              ✍️ Cadastro
            </a>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
